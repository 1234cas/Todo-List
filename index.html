<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Daily Todo</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: rgba(255, 255, 255, 0.94);
      --text: #111827;
      --muted: #6b7280;
      --soft-muted: #9ca3af;
      --primary: #ec6f91;
      --primary-dark: #d85b7d;
      --blue: #7c9cff;
      --green: #55b987;
      --yellow: #ffc857;
      --danger: #ef6464;
      --shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 6px 18px rgba(15, 23, 42, 0.06);
      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(246,247,251,0.88) 40%, rgba(241,244,249,1) 100%),
        radial-gradient(circle at top right, rgba(236, 111, 145, 0.08), transparent 32%),
        #f6f7fb;
      padding: 22px;
    }

    [hidden] { display: none !important; }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    button, select, textarea, input { font-family: inherit; }

    button {
      border: none;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .auth-gate {
      min-height: calc(100vh - 44px);
      display: grid;
      place-items: center;
    }

    .login-card {
      width: min(430px, 100%);
      padding: 30px;
    }

    .login-card h1 {
      margin: 0 0 10px;
      font-size: 34px;
      letter-spacing: -0.8px;
      line-height: 1.05;
    }

    .login-card p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .login-form { display: grid; gap: 12px; }

    .input,
    .textarea,
    .select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      font-size: 15px;
      outline: none;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.02);
    }

    .input, .select {
      height: 48px;
      padding: 0 14px;
    }

    .textarea {
      min-height: 84px;
      resize: vertical;
      padding: 12px 14px;
      line-height: 1.55;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      border-color: rgba(236, 111, 145, 0.5);
      box-shadow: 0 0 0 4px rgba(236, 111, 145, 0.1);
    }

    .primary-btn {
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(236, 111, 145, 0.2);
    }

    .auth-message {
      min-height: 22px;
      margin-top: 12px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.5;
    }

    .app {
      width: min(1240px, 100%);
      margin: 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .intro {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .intro::after {
      content: "♡";
      position: absolute;
      right: 24px;
      top: 18px;
      font-size: 74px;
      color: rgba(236, 111, 145, 0.055);
      transform: rotate(10deg);
      pointer-events: none;
    }

    .intro h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.8px;
      line-height: 1.1;
      color: #111827;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      max-width: 620px;
    }

    .date-card {
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      background: rgba(255, 255, 255, 0.96);
    }

    .date-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .today-text {
      font-weight: 750;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: -0.4px;
      color: #111827;
    }

    #daySubtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .sync-status {
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(85, 185, 135, 0.1);
      color: #2f7f59;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .date-nav {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 10px;
      align-items: center;
    }

    .date-input {
      height: 44px;
      border-radius: 14px;
      border-color: var(--border-strong);
      color: #111827;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0.1px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border-strong);
      color: #6b7280;
      font-size: 18px;
      font-weight: 750;
      box-shadow: var(--shadow-soft);
    }

    .daily-section {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .mood-card,
    .message-card {
      padding: 22px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.2px;
    }

    .mood-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mood-item label,
    .message-item label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .message-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .save-hint {
      color: var(--soft-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .main {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .together-card {
      grid-column: 1 / -1;
    }

    .person-card { padding: 22px; }

    .person-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .person-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      font-size: 22px;
      background: linear-gradient(135deg, rgba(236, 111, 145, 0.11), rgba(255, 255, 255, 0.9));
      border: 1px solid rgba(236, 111, 145, 0.1);
      flex: 0 0 auto;
    }

    .person-title h2 {
      margin: 0;
      font-size: 21px;
      letter-spacing: -0.2px;
    }

    .progress-wrap {
      text-align: right;
      min-width: 76px;
    }

    .progress-text {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 650;
    }

    .progress-bar {
      width: 76px;
      height: 8px;
      background: rgba(236, 111, 145, 0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--blue));
      border-radius: inherit;
      transition: 0.2s ease;
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 10px;
      margin-bottom: 12px;
    }

    .todo-input { height: 46px; }

    .add-btn {
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(236, 111, 145, 0.2);
    }

    .carry-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      margin-bottom: 14px;
      border-radius: 16px;
      background: rgba(124, 156, 255, 0.08);
      border: 1px solid rgba(124, 156, 255, 0.15);
      color: #526188;
      font-size: 13px;
      line-height: 1.5;
    }

    .carry-btn {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      border: 1px solid rgba(124, 156, 255, 0.22);
      color: #526188;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .encourage {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(85, 185, 135, 0.13), rgba(236, 111, 145, 0.09));
      border: 1px solid rgba(85, 185, 135, 0.16);
      color: #2f7f59;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.5;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 160px;
    }

    .todo-item {
      display: grid;
      grid-template-columns: 34px 1fr 38px 36px;
      align-items: start;
      gap: 9px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(15, 23, 42, 0.07);
      border-radius: 18px;
      padding: 11px 9px;
    }

    .todo-item.done { opacity: 0.72; }
    .todo-item.pinned { border-color: rgba(236, 111, 145, 0.22); background: rgba(255, 255, 255, 0.92); }

    .check-btn {
      width: 30px;
      height: 30px;
      border-radius: 11px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: #fff;
      color: transparent;
      font-weight: 900;
      margin-top: 1px;
    }

    .todo-item.done .check-btn {
      background: linear-gradient(135deg, var(--green), #8ee3b6);
      color: #fff;
      border-color: transparent;
    }

    .todo-body { min-width: 0; }

    .todo-text {
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-note {
      margin-top: 8px;
      color: #4b5563;
      font-size: 13px;
      line-height: 1.55;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.04);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .checklist {
      margin: 8px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
    }

    .checklist li {
      display: grid;
      grid-template-columns: 22px 1fr 22px;
      align-items: center;
      gap: 6px;
      color: #4b5563;
      font-size: 13px;
      line-height: 1.4;
    }

    .checklist-item-done .checklist-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .tiny-check {
      width: 20px;
      height: 20px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--border-strong);
      color: transparent;
      font-size: 12px;
      font-weight: 900;
      padding: 0;
    }

    .checklist-item-done .tiny-check {
      background: var(--green);
      color: #fff;
      border-color: transparent;
    }

    .tiny-delete {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: rgba(239, 100, 100, 0.08);
      color: var(--danger);
      font-weight: 900;
      padding: 0;
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 7px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .badge-important { background: rgba(236, 111, 145, 0.12); color: #c64d70; }
    .badge-normal { background: rgba(15, 23, 42, 0.06); color: var(--muted); }
    .badge-pin { background: rgba(255, 200, 87, 0.22); color: #9a6a00; }
    .badge-carry { background: rgba(124, 156, 255, 0.13); color: #526188; }

    .pin-btn,
    .delete-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 900;
      margin-top: 0;
      padding: 0;
    }

    .pin-btn {
      background: rgba(255, 200, 87, 0.12);
      color: #a06c00;
    }

    .pin-btn.active {
      background: rgba(255, 200, 87, 0.26);
      color: #8a5a00;
    }

    .delete-btn {
      background: rgba(239, 100, 100, 0.1);
      color: var(--danger);
      font-size: 18px;
    }

    .todo-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 9px;
      flex-wrap: wrap;
    }

    .mini-btn {
      height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed rgba(15, 23, 42, 0.14);
      background: rgba(255, 255, 255, 0.5);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      line-height: 1.7;
      font-size: 14px;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
      padding-top: 8px;
    }

    .page-btn {
      min-width: 38px;
      height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border-strong);
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .page-btn:disabled { opacity: 0.38; }

    .page-info {
      min-width: 74px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .footer {
      margin-top: 18px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .power-line {
      color: #4b5563;
      font-weight: 800;
      line-height: 1.6;
    }

    .mood-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mood-inline label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .mood-select {
      width: 116px;
      height: 38px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .user-email {
      color: var(--muted);
      font-weight: 700;
    }

    .secondary-btn,
    .logout-btn {
      background: #fff;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .secondary-btn { color: var(--muted); }
    .logout-btn { color: var(--danger); }

    @media (max-width: 1100px) {
      .main { grid-template-columns: 1fr; }
    }

    @media (max-width: 800px) {
      body { padding: 14px; }
      .hero { grid-template-columns: 1fr; }
      .mood-grid { grid-template-columns: 1fr; }
      .intro, .date-card, .person-card, .login-card, .mood-card { padding: 20px; }
      .footer { flex-direction: column; align-items: flex-start; }
      .add-row { grid-template-columns: 1fr 76px; }
      .todo-item { grid-template-columns: 34px 1fr 36px 36px; gap: 8px; }
      .carry-row { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <section class="auth-gate" id="authGate">
    <div class="panel login-card">
      <h1>Our Daily Todo</h1>
      <p>这是米和圈的每日待办清单。登录后才能查看和修改数据。</p>
      <div class="login-form">
        <input class="input" id="loginEmail" type="email" autocomplete="email" placeholder="邮箱" />
        <input class="input" id="loginPassword" type="password" autocomplete="current-password" placeholder="密码" />
        <button class="primary-btn" id="loginBtn">登录</button>
      </div>
      <div class="auth-message" id="authMessage"></div>
    </div>
  </section>

  <div class="app" id="app" hidden>
    <section class="hero">
      <div class="panel intro">
        <h1>Our Daily Todo</h1>
        <p class="subtitle">每天一起完成一点点。米、圈、一起做，各自努力，也一起把日子过好。</p>
      </div>

      <div class="panel date-card">
        <div class="date-top">
          <div>
            <div class="today-text" id="dayTitle">今天</div>
            <div class="subtitle" id="daySubtitle">一起把今天过好。</div>
          </div>
          <div class="sync-status" id="syncStatus">连接中</div>
        </div>

        <div class="date-nav">
          <button class="icon-btn" id="prevDay" title="前一天">‹</button>
          <input class="input date-input" type="date" id="datePicker" />
          <button class="icon-btn" id="nextDay" title="后一天">›</button>
        </div>
      </div>
    </section>

    <main class="main">
      <section class="panel person-card">
        <div class="person-header">
          <div class="person-title">
            <div class="avatar">🧸</div>
            <h2 id="meName">米的待办</h2>
          </div>
          <div class="progress-wrap">
            <div class="progress-text" id="meProgressText">0/0</div>
            <div class="progress-bar"><div class="progress-inner" id="meProgressBar"></div></div>
          </div>
        </div>
        <div class="add-row">
          <input class="input todo-input" id="meInput" placeholder="米今天要做什么？" />
          <button class="add-btn" id="meAdd">添加</button>
        </div>
        <div class="carry-row" id="meCarry" hidden></div>
        <div class="encourage" id="meEncourage">米今天全部完成啦，很棒 🧸</div>
        <div class="todo-list" id="meList"></div>
      </section>

      <section class="panel person-card">
        <div class="person-header">
          <div class="person-title">
            <div class="avatar">🍩</div>
            <h2 id="herName">圈的待办</h2>
          </div>
          <div class="progress-wrap">
            <div class="progress-text" id="herProgressText">0/0</div>
            <div class="progress-bar"><div class="progress-inner" id="herProgressBar"></div></div>
          </div>
        </div>
        <div class="add-row">
          <input class="input todo-input" id="herInput" placeholder="圈今天要做什么？" />
          <button class="add-btn" id="herAdd">添加</button>
        </div>
        <div class="carry-row" id="herCarry" hidden></div>
        <div class="encourage" id="herEncourage">圈今天全部完成啦，奖励甜甜圈 🍩</div>
        <div class="todo-list" id="herList"></div>
      </section>

      <section class="panel person-card together-card">
        <div class="person-header">
          <div class="person-title">
            <div class="avatar">🤝</div>
            <h2 id="togetherName">一起做</h2>
          </div>
          <div class="progress-wrap">
            <div class="progress-text" id="togetherProgressText">0/0</div>
            <div class="progress-bar"><div class="progress-inner" id="togetherProgressBar"></div></div>
          </div>
        </div>
        <div class="add-row">
          <input class="input todo-input" id="togetherInput" placeholder="今天一起做什么？" />
          <button class="add-btn" id="togetherAdd">添加</button>
        </div>
        <div class="carry-row" id="togetherCarry" hidden></div>
        <div class="encourage" id="togetherEncourage">今天一起做的也完成啦，默契加一 🤝</div>
        <div class="todo-list" id="togetherList"></div>
      </section>
    </main>

    <footer class="panel footer">
      <div class="footer-left">
        <span class="power-line" id="powerLine">认真生活的人，都会一点点变强。</span>
        <div class="mood-inline">
          <label for="meMood">米</label>
          <select class="select mood-select" id="meMood">
            <option value="">心情</option>
            <option value="开心 😊">开心 😊</option>
            <option value="平静 🌿">平静 🌿</option>
            <option value="有点累 😴">有点累 😴</option>
            <option value="压力大 🌧️">压力大 🌧️</option>
            <option value="想摆烂 🫠">想摆烂 🫠</option>
            <option value="充满力量 🔥">充满力量 🔥</option>
          </select>
          <label for="herMood">圈</label>
          <select class="select mood-select" id="herMood">
            <option value="">心情</option>
            <option value="开心 😊">开心 😊</option>
            <option value="平静 🌿">平静 🌿</option>
            <option value="有点累 😴">有点累 😴</option>
            <option value="压力大 🌧️">压力大 🌧️</option>
            <option value="想摆烂 🫠">想摆烂 🫠</option>
            <option value="充满力量 🔥">充满力量 🔥</option>
          </select>
          <span class="save-hint" id="moodHint">自动保存</span>
        </div>
      </div>
      <div class="footer-actions">
        <span class="user-email" id="userEmail"></span>
        <button class="secondary-btn" id="copyLinkBtn">复制今日链接</button>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
      </div>
    </footer>
  </div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyDvWq8Zyeyman426znZoaWxZUrpzzKUkZk",
      authDomain: "todo-list-678cb.firebaseapp.com",
      projectId: "todo-list-678cb",
      storageBucket: "todo-list-678cb.firebasestorage.app",
      messagingSenderId: "938956444065",
      appId: "1:938956444065:web:52a731e1b9e4d34d35fbe0",
      measurementId: "G-JTK8DJV93X"
    };

    const COUPLE_ID = "our-daily-todo";
    const PEOPLE = ["me", "her", "together"];
    const PAGE_SIZE = 8;

    const PERSON_NAMES = {
      me: "米的待办",
      her: "圈的待办",
      together: "一起做"
    };

    const POWER_LINES = [
      "认真生活的人，都会一点点变强。",
      "慢慢来，今天完成一点也很了不起。",
      "把小事做好，日子就会一点点变亮。",
      "不用一下子很厉害，坚持下去就已经很厉害。",
      "今天的努力，会在某一天悄悄奖励你。",
      "先完成一件小事，状态就会回来。",
      "两个人一起往前走，普通的一天也会发光。",
      "别急，稳稳地做，答案会慢慢出现。"
    ];

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import {
      getFirestore,
      doc,
      onSnapshot,
      setDoc,
      updateDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const $ = (selector) => document.querySelector(selector);

    const state = {
      app: null,
      auth: null,
      db: null,
      user: null,
      unsubscribe: null,
      saveTimer: null,
      selectedDate: getTodayString(),
      data: createEmptyStateData(),
      page: { me: 1, her: 1, together: 1 },
      previousIncomplete: { me: [], her: [], together: [] },
      isApplyingRemote: false
    };

    const els = {
      authGate: $("#authGate"),
      appRoot: $("#app"),
      loginEmail: $("#loginEmail"),
      loginPassword: $("#loginPassword"),
      loginBtn: $("#loginBtn"),
      authMessage: $("#authMessage"),
      userEmail: $("#userEmail"),
      logoutBtn: $("#logoutBtn"),
      powerLine: $("#powerLine"),
      dayTitle: $("#dayTitle"),
      daySubtitle: $("#daySubtitle"),
      syncStatus: $("#syncStatus"),
      datePicker: $("#datePicker"),
      prevDay: $("#prevDay"),
      nextDay: $("#nextDay"),
      meName: $("#meName"),
      herName: $("#herName"),
      togetherName: $("#togetherName"),
      meMood: $("#meMood"),
      herMood: $("#herMood"),
      moodHint: $("#moodHint"),
      meInput: $("#meInput"),
      herInput: $("#herInput"),
      togetherInput: $("#togetherInput"),
      meAdd: $("#meAdd"),
      herAdd: $("#herAdd"),
      togetherAdd: $("#togetherAdd"),
      meCarry: $("#meCarry"),
      herCarry: $("#herCarry"),
      togetherCarry: $("#togetherCarry"),
      meEncourage: $("#meEncourage"),
      herEncourage: $("#herEncourage"),
      togetherEncourage: $("#togetherEncourage"),
      meList: $("#meList"),
      herList: $("#herList"),
      togetherList: $("#togetherList"),
      meProgressText: $("#meProgressText"),
      herProgressText: $("#herProgressText"),
      togetherProgressText: $("#togetherProgressText"),
      meProgressBar: $("#meProgressBar"),
      herProgressBar: $("#herProgressBar"),
      togetherProgressBar: $("#togetherProgressBar"),
      copyLinkBtn: $("#copyLinkBtn")
    };

    init();

    function init() {
      els.meName.textContent = PERSON_NAMES.me;
      els.herName.textContent = PERSON_NAMES.her;
      els.togetherName.textContent = PERSON_NAMES.together;
      els.datePicker.value = state.selectedDate;
      els.powerLine.textContent = getRandomPowerLine();
      bindEvents();
      initFirebase();
    }

    function initFirebase() {
      try {
        state.app = initializeApp(firebaseConfig);
        state.auth = getAuth(state.app);
        state.db = getFirestore(state.app);

        onAuthStateChanged(state.auth, (user) => {
          if (user) {
            state.user = user;
            showApp(user);
            loadDate(state.selectedDate);
          } else {
            state.user = null;
            showLogin();
          }
        });
      } catch (error) {
        console.error(error);
        showLogin();
        els.authMessage.textContent = "Firebase 初始化失败，请检查 firebaseConfig 是否复制完整。";
      }
    }

    function bindEvents() {
      els.loginBtn.addEventListener("click", login);
      els.loginEmail.addEventListener("keydown", (event) => { if (event.key === "Enter") login(); });
      els.loginPassword.addEventListener("keydown", (event) => { if (event.key === "Enter") login(); });

      els.logoutBtn.addEventListener("click", async () => {
        if (state.unsubscribe) {
          state.unsubscribe();
          state.unsubscribe = null;
        }
        await signOut(state.auth);
      });

      els.meAdd.addEventListener("click", () => addTodo("me"));
      els.herAdd.addEventListener("click", () => addTodo("her"));
      els.togetherAdd.addEventListener("click", () => addTodo("together"));

      els.meInput.addEventListener("keydown", (event) => { if (event.key === "Enter") addTodo("me"); });
      els.herInput.addEventListener("keydown", (event) => { if (event.key === "Enter") addTodo("her"); });
      els.togetherInput.addEventListener("keydown", (event) => { if (event.key === "Enter") addTodo("together"); });

      els.meMood.addEventListener("change", () => updateMood("me", els.meMood.value));
      els.herMood.addEventListener("change", () => updateMood("her", els.herMood.value));


      els.datePicker.addEventListener("change", (event) => loadDate(event.target.value));
      els.prevDay.addEventListener("click", () => changeDay(-1));
      els.nextDay.addEventListener("click", () => changeDay(1));

      els.copyLinkBtn.addEventListener("click", async () => {
        const url = new URL(window.location.href);
        url.searchParams.set("date", state.selectedDate);
        await navigator.clipboard.writeText(url.toString());
        els.copyLinkBtn.textContent = "已复制";
        setTimeout(() => { els.copyLinkBtn.textContent = "复制今日链接"; }, 1200);
      });
    }

    async function login() {
      const email = els.loginEmail.value.trim();
      const password = els.loginPassword.value;

      if (!state.auth) {
        els.authMessage.textContent = "Firebase 还没配置好，暂时不能登录。";
        return;
      }

      if (!email || !password) {
        els.authMessage.textContent = "请输入邮箱和密码。";
        return;
      }

      try {
        els.loginBtn.disabled = true;
        els.loginBtn.textContent = "登录中...";
        els.authMessage.textContent = "";
        await signInWithEmailAndPassword(state.auth, email, password);
      } catch (error) {
        console.error(error);
        els.authMessage.textContent = "登录失败：检查邮箱密码，或确认 Firebase 已开启 Email/Password 登录。";
      } finally {
        els.loginBtn.disabled = false;
        els.loginBtn.textContent = "登录";
      }
    }

    function showLogin() {
      els.authGate.hidden = false;
      els.appRoot.hidden = true;
      els.userEmail.textContent = "";
    }

    function showApp(user) {
      els.authGate.hidden = true;
      els.appRoot.hidden = false;
      els.userEmail.textContent = user.email || "已登录";
      setSyncStatus("云同步已连接", "ok");
    }

    async function loadDate(dateString) {
      const urlDate = new URLSearchParams(window.location.search).get("date");
      if (urlDate && isValidDateString(urlDate) && state.selectedDate === getTodayString()) {
        dateString = urlDate;
      }

      state.selectedDate = dateString;
      els.datePicker.value = dateString;
      renderDateTitle();
      resetPages();

      if (state.unsubscribe) {
        state.unsubscribe();
        state.unsubscribe = null;
      }

      await loadPreviousIncomplete();
      listenCloudData();
    }

    function listenCloudData() {
      if (!state.db || !state.user) return;

      const ref = getDayDocRef(state.selectedDate);
      state.unsubscribe = onSnapshot(ref, async (snapshot) => {
        if (!snapshot.exists()) {
          const initialData = createEmptyDayData();
          await setDoc(ref, initialData);
          return;
        }

        state.isApplyingRemote = true;
        state.data = normalizeData(snapshot.data());
        render();
        state.isApplyingRemote = false;
        setSyncStatus("已同步", "ok");
      }, (error) => {
        console.error(error);
        setSyncStatus("同步失败", "error");
      });
    }

    async function loadPreviousIncomplete() {
      state.previousIncomplete = { me: [], her: [], together: [] };
      if (!state.db || !state.user) return;

      const previousDate = addDays(state.selectedDate, -1);

      try {
        const snapshot = await getDoc(getDayDocRef(previousDate));
        if (!snapshot.exists()) return;

        const previousData = normalizeData(snapshot.data());
        PEOPLE.forEach((person) => {
          state.previousIncomplete[person] = previousData[person].filter((todo) => !todo.done);
        });
      } catch (error) {
        console.error(error);
      }
    }

    async function saveData() {
      if (!state.db || !state.user) return;

      const payload = {
        ...state.data,
        updatedAt: new Date().toISOString(),
        updatedBy: state.user.email || state.user.uid
      };

      try {
        await updateDoc(getDayDocRef(state.selectedDate), payload);
        setSyncStatus("已同步", "ok");
      } catch (error) {
        try {
          await setDoc(getDayDocRef(state.selectedDate), payload);
          setSyncStatus("已同步", "ok");
        } catch (finalError) {
          console.error(finalError);
          setSyncStatus("保存失败", "error");
        }
      }
    }

    function scheduleSave(hintEl) {
      if (state.isApplyingRemote) return;
      if (hintEl) hintEl.textContent = "保存中...";
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(async () => {
        await saveData();
        if (hintEl) {
          hintEl.textContent = "已保存";
          setTimeout(() => { hintEl.textContent = "自动保存"; }, 900);
        }
      }, 500);
    }

    function addTodo(person) {
      const input = getInput(person);
      const text = input.value.trim();

      if (!text) return;

      state.data[person].push({
        id: createId(),
        text,
        done: false,
        priority: "normal",
        pinned: false,
        note: "",
        checklist: [],
        createdAt: new Date().toISOString(),
        createdBy: state.user ? state.user.email : "unknown"
      });

      state.page[person] = getTotalPages(person);
      input.value = "";
      render();
      saveData();
    }

    function carryTomorrow(person) {
      const previousTodos = state.previousIncomplete[person] || [];
      const existingCarryIds = new Set((state.data[person] || []).map((todo) => todo.carriedFromId).filter(Boolean));
      const todosToCarry = previousTodos.filter((todo) => !existingCarryIds.has(todo.id));

      if (todosToCarry.length === 0) return;

      const previousDate = addDays(state.selectedDate, -1);
      const carriedTodos = todosToCarry.map((todo) => ({
        id: createId(),
        text: todo.text,
        done: false,
        priority: todo.priority || "normal",
        pinned: Boolean(todo.pinned),
        note: todo.note || "",
        checklist: Array.isArray(todo.checklist) ? todo.checklist.map((item) => ({ ...item, done: false })) : [],
        carriedFrom: previousDate,
        carriedFromId: todo.id,
        createdAt: new Date().toISOString(),
        createdBy: state.user ? state.user.email : "unknown"
      }));

      state.data[person] = state.data[person].concat(carriedTodos);
      state.page[person] = 1;
      render();
      saveData();
    }

    function updateMood(person, value) {
      state.data.mood[person] = value;
      scheduleSave(els.moodHint);
    }


    function toggleTodo(person, id) {
      state.data[person] = state.data[person].map((todo) => {
        if (todo.id !== id) return todo;
        const nextDone = !todo.done;
        return {
          ...todo,
          done: nextDone,
          doneAt: nextDone ? new Date().toISOString() : null,
          doneBy: nextDone && state.user ? state.user.email : null
        };
      });

      render();
      saveData();
    }

    function togglePin(person, id) {
      state.data[person] = state.data[person].map((todo) => {
        if (todo.id !== id) return todo;
        return { ...todo, pinned: !Boolean(todo.pinned) };
      });

      state.page[person] = 1;
      render();
      saveData();
    }

    function togglePriority(person, id) {
      state.data[person] = state.data[person].map((todo) => {
        if (todo.id !== id) return todo;
        const nextPriority = todo.priority === "important" ? "normal" : "important";
        return { ...todo, priority: nextPriority };
      });

      state.page[person] = 1;
      render();
      saveData();
    }

    function editNote(person, id) {
      const todo = findTodo(person, id);
      if (!todo) return;

      const nextNote = prompt("备注", todo.note || "");
      if (nextNote === null) return;

      state.data[person] = state.data[person].map((item) => {
        if (item.id !== id) return item;
        return { ...item, note: nextNote.trim() };
      });

      render();
      saveData();
    }

    function addChecklistItem(person, id) {
      const text = prompt("添加小清单", "");
      if (text === null || !text.trim()) return;

      state.data[person] = state.data[person].map((todo) => {
        if (todo.id !== id) return todo;
        const checklist = Array.isArray(todo.checklist) ? todo.checklist : [];
        return {
          ...todo,
          checklist: checklist.concat({
            id: createId(),
            text: text.trim(),
            done: false
          })
        };
      });

      render();
      saveData();
    }

    function toggleChecklistItem(person, todoId, itemId) {
      state.data[person] = state.data[person].map((todo) => {
        if (todo.id !== todoId) return todo;
        return {
          ...todo,
          checklist: (todo.checklist || []).map((item) => {
            if (item.id !== itemId) return item;
            return { ...item, done: !Boolean(item.done) };
          })
        };
      });

      render();
      saveData();
    }

    function deleteChecklistItem(person, todoId, itemId) {
      state.data[person] = state.data[person].map((todo) => {
        if (todo.id !== todoId) return todo;
        return {
          ...todo,
          checklist: (todo.checklist || []).filter((item) => item.id !== itemId)
        };
      });

      render();
      saveData();
    }

    function deleteTodo(person, id) {
      state.data[person] = state.data[person].filter((todo) => todo.id !== id);
      state.page[person] = Math.min(state.page[person], getTotalPages(person));
      render();
      saveData();
    }

    function render() {
      renderDailyFields();
      PEOPLE.forEach((person) => {
        renderCarryRow(person);
        renderEncourage(person);
        renderList(person, getListEl(person));
        renderProgress(person);
      });
    }

    function renderDailyFields() {
      els.meMood.value = state.data.mood.me || "";
      els.herMood.value = state.data.mood.her || "";
    }

    function renderCarryRow(person) {
      const el = getCarryEl(person);
      const previousTodos = state.previousIncomplete[person] || [];
      const existingCarryIds = new Set((state.data[person] || []).map((todo) => todo.carriedFromId).filter(Boolean));
      const count = previousTodos.filter((todo) => !existingCarryIds.has(todo.id)).length;
      const name = getShortName(person);

      if (count <= 0) {
        el.hidden = true;
        el.innerHTML = "";
        return;
      }

      el.hidden = false;
      el.innerHTML = "";

      const text = document.createElement("span");
      text.textContent = name + "昨天有 " + count + " 条未完成，可以顺延到今天。";

      const button = document.createElement("button");
      button.className = "carry-btn";
      button.textContent = "顺延到今天";
      button.addEventListener("click", () => carryTomorrow(person));

      el.appendChild(text);
      el.appendChild(button);
    }

    function renderEncourage(person) {
      const todos = state.data[person] || [];
      const el = getEncourageEl(person);
      const allDone = todos.length > 0 && todos.every((todo) => todo.done);
      el.style.display = allDone ? "block" : "none";
    }

    function renderList(person, container) {
      const todos = getSortedTodos(person);

      if (todos.length === 0) {
        container.innerHTML = "<div class='empty'>今天还没有待办。<br />先写下一件小事吧。</div>";
        state.page[person] = 1;
        return;
      }

      const totalPages = getTotalPages(person);
      state.page[person] = Math.min(Math.max(state.page[person] || 1, 1), totalPages);

      const currentPage = state.page[person];
      const startIndex = (currentPage - 1) * PAGE_SIZE;
      const pageTodos = todos.slice(startIndex, startIndex + PAGE_SIZE);

      container.innerHTML = "";

      pageTodos.forEach((todo) => {
        const item = document.createElement("div");
        item.className = "todo-item" + (todo.done ? " done" : "") + (todo.pinned ? " pinned" : "");

        const checkBtn = document.createElement("button");
        checkBtn.className = "check-btn";
        checkBtn.textContent = "✓";
        checkBtn.title = todo.done ? "标记为未完成" : "标记为完成";
        checkBtn.addEventListener("click", () => toggleTodo(person, todo.id));

        const body = document.createElement("div");
        body.className = "todo-body";

        const text = document.createElement("div");
        text.className = "todo-text";
        text.textContent = todo.text;

        const meta = document.createElement("div");
        meta.className = "todo-meta";

        const priorityBadge = document.createElement("span");
        priorityBadge.className = "badge " + (todo.priority === "important" ? "badge-important" : "badge-normal");
        priorityBadge.textContent = todo.priority === "important" ? "重要" : "普通";
        meta.appendChild(priorityBadge);

        if (todo.pinned) {
          const pinBadge = document.createElement("span");
          pinBadge.className = "badge badge-pin";
          pinBadge.textContent = "置顶";
          meta.appendChild(pinBadge);
        }

        if (todo.carriedFrom) {
          const carryBadge = document.createElement("span");
          carryBadge.className = "badge badge-carry";
          carryBadge.textContent = "顺延";
          meta.appendChild(carryBadge);
        }

        body.appendChild(text);
        body.appendChild(meta);

        if (todo.note) {
          const note = document.createElement("div");
          note.className = "todo-note";
          note.textContent = todo.note;
          body.appendChild(note);
        }

        if (Array.isArray(todo.checklist) && todo.checklist.length > 0) {
          body.appendChild(renderChecklist(person, todo));
        }

        const actions = document.createElement("div");
        actions.className = "todo-actions";

        const priorityBtn = document.createElement("button");
        priorityBtn.className = "mini-btn";
        priorityBtn.textContent = todo.priority === "important" ? "改普通" : "设重要";
        priorityBtn.addEventListener("click", () => togglePriority(person, todo.id));
        actions.appendChild(priorityBtn);

        const noteBtn = document.createElement("button");
        noteBtn.className = "mini-btn";
        noteBtn.textContent = todo.note ? "改备注" : "备注";
        noteBtn.addEventListener("click", () => editNote(person, todo.id));
        actions.appendChild(noteBtn);

        const checklistBtn = document.createElement("button");
        checklistBtn.className = "mini-btn";
        checklistBtn.textContent = "+小项";
        checklistBtn.addEventListener("click", () => addChecklistItem(person, todo.id));
        actions.appendChild(checklistBtn);

        body.appendChild(actions);

        const pinBtn = document.createElement("button");
        pinBtn.className = "pin-btn" + (todo.pinned ? " active" : "");
        pinBtn.textContent = "📌";
        pinBtn.title = todo.pinned ? "取消置顶" : "置顶";
        pinBtn.addEventListener("click", () => togglePin(person, todo.id));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "×";
        deleteBtn.title = "删除";
        deleteBtn.addEventListener("click", () => deleteTodo(person, todo.id));

        item.appendChild(checkBtn);
        item.appendChild(body);
        item.appendChild(pinBtn);
        item.appendChild(deleteBtn);
        container.appendChild(item);
      });

      if (totalPages > 1) {
        const pagination = document.createElement("div");
        pagination.className = "pagination";

        const prevBtn = document.createElement("button");
        prevBtn.className = "page-btn";
        prevBtn.textContent = "上一页";
        prevBtn.disabled = currentPage === 1;
        prevBtn.addEventListener("click", () => {
          state.page[person] = Math.max(1, state.page[person] - 1);
          render();
        });

        const pageInfo = document.createElement("div");
        pageInfo.className = "page-info";
        pageInfo.textContent = currentPage + " / " + totalPages;

        const nextBtn = document.createElement("button");
        nextBtn.className = "page-btn";
        nextBtn.textContent = "下一页";
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.addEventListener("click", () => {
          state.page[person] = Math.min(totalPages, state.page[person] + 1);
          render();
        });

        pagination.appendChild(prevBtn);
        pagination.appendChild(pageInfo);
        pagination.appendChild(nextBtn);
        container.appendChild(pagination);
      }
    }

    function renderChecklist(person, todo) {
      const list = document.createElement("ul");
      list.className = "checklist";

      todo.checklist.forEach((item) => {
        const li = document.createElement("li");
        li.className = item.done ? "checklist-item-done" : "";

        const check = document.createElement("button");
        check.className = "tiny-check";
        check.textContent = "✓";
        check.addEventListener("click", () => toggleChecklistItem(person, todo.id, item.id));

        const text = document.createElement("span");
        text.className = "checklist-text";
        text.textContent = item.text;

        const del = document.createElement("button");
        del.className = "tiny-delete";
        del.textContent = "×";
        del.addEventListener("click", () => deleteChecklistItem(person, todo.id, item.id));

        li.appendChild(check);
        li.appendChild(text);
        li.appendChild(del);
        list.appendChild(li);
      });

      return list;
    }

    function getSortedTodos(person) {
      const todos = state.data[person] || [];
      return [...todos].sort((a, b) => {
        if (Boolean(a.pinned) !== Boolean(b.pinned)) return Boolean(b.pinned) - Boolean(a.pinned);
        if ((a.priority || "normal") !== (b.priority || "normal")) {
          return (b.priority === "important" ? 1 : 0) - (a.priority === "important" ? 1 : 0);
        }
        return new Date(a.createdAt || 0).getTime() - new Date(b.createdAt || 0).getTime();
      });
    }

    function getTotalPages(person) {
      const todos = getSortedTodos(person);
      return Math.max(1, Math.ceil(todos.length / PAGE_SIZE));
    }

    function renderProgress(person) {
      const todos = state.data[person] || [];
      const done = todos.filter((todo) => todo.done).length;
      const total = todos.length;
      const percent = total === 0 ? 0 : Math.round((done / total) * 100);

      const textEl = getProgressTextEl(person);
      const barEl = getProgressBarEl(person);

      textEl.textContent = done + "/" + total;
      barEl.style.width = percent + "%";
    }

    function renderDateTitle() {
      const today = getTodayString();
      const yesterday = addDays(today, -1);
      const tomorrow = addDays(today, 1);

      if (state.selectedDate === today) {
        els.dayTitle.textContent = "今天";
        els.daySubtitle.textContent = formatPrettyDate(state.selectedDate) + " · 一起把今天过好。";
      } else if (state.selectedDate === yesterday) {
        els.dayTitle.textContent = "昨天";
        els.daySubtitle.textContent = formatPrettyDate(state.selectedDate) + " · 回顾一下完成了什么。";
      } else if (state.selectedDate === tomorrow) {
        els.dayTitle.textContent = "明天";
        els.daySubtitle.textContent = formatPrettyDate(state.selectedDate) + " · 提前安排也很棒。";
      } else {
        els.dayTitle.textContent = "某一天";
        els.daySubtitle.textContent = formatPrettyDate(state.selectedDate) + " · 每一天都值得记录。";
      }
    }

    function changeDay(offset) {
      loadDate(addDays(state.selectedDate, offset));
    }

    function getDayDocRef(dateString) {
      return doc(state.db, "coupleTodos", COUPLE_ID, "days", dateString);
    }

    function createEmptyStateData() {
      return {
        me: [],
        her: [],
        together: [],
        mood: { me: "", her: "" }
      };
    }

    function createEmptyDayData() {
      return {
        ...createEmptyStateData(),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        createdBy: state.user ? state.user.email : "unknown"
      };
    }

    function normalizeData(data) {
      const normalized = createEmptyStateData();

      PEOPLE.forEach((person) => {
        normalized[person] = Array.isArray(data[person]) ? data[person].map(normalizeTodo) : [];
      });

      normalized.mood = {
        me: data.mood && typeof data.mood.me === "string" ? data.mood.me : "",
        her: data.mood && typeof data.mood.her === "string" ? data.mood.her : ""
      };


      return normalized;
    }

    function normalizeTodo(todo) {
      return {
        ...todo,
        priority: todo.priority === "important" ? "important" : "normal",
        pinned: Boolean(todo.pinned),
        note: typeof todo.note === "string" ? todo.note : "",
        checklist: Array.isArray(todo.checklist) ? todo.checklist.map(normalizeChecklistItem) : []
      };
    }

    function normalizeChecklistItem(item) {
      return {
        id: item.id || createId(),
        text: typeof item.text === "string" ? item.text : "",
        done: Boolean(item.done)
      };
    }

    function findTodo(person, id) {
      return (state.data[person] || []).find((todo) => todo.id === id);
    }

    function setSyncStatus(text, type) {
      els.syncStatus.textContent = text;

      if (type === "ok") {
        els.syncStatus.style.background = "rgba(85, 185, 135, 0.1)";
        els.syncStatus.style.color = "#2f7f59";
      }

      if (type === "warn") {
        els.syncStatus.style.background = "rgba(255, 200, 87, 0.16)";
        els.syncStatus.style.color = "#986d00";
      }

      if (type === "error") {
        els.syncStatus.style.background = "rgba(239, 100, 100, 0.12)";
        els.syncStatus.style.color = "#b84545";
      }
    }

    function resetPages() {
      PEOPLE.forEach((person) => { state.page[person] = 1; });
    }

    function getInput(person) {
      if (person === "me") return els.meInput;
      if (person === "her") return els.herInput;
      return els.togetherInput;
    }

    function getListEl(person) {
      if (person === "me") return els.meList;
      if (person === "her") return els.herList;
      return els.togetherList;
    }

    function getCarryEl(person) {
      if (person === "me") return els.meCarry;
      if (person === "her") return els.herCarry;
      return els.togetherCarry;
    }

    function getEncourageEl(person) {
      if (person === "me") return els.meEncourage;
      if (person === "her") return els.herEncourage;
      return els.togetherEncourage;
    }

    function getProgressTextEl(person) {
      if (person === "me") return els.meProgressText;
      if (person === "her") return els.herProgressText;
      return els.togetherProgressText;
    }

    function getProgressBarEl(person) {
      if (person === "me") return els.meProgressBar;
      if (person === "her") return els.herProgressBar;
      return els.togetherProgressBar;
    }

    function getShortName(person) {
      if (person === "me") return "米";
      if (person === "her") return "圈";
      return "一起做";
    }

    function getRandomPowerLine() {
      return POWER_LINES[Math.floor(Math.random() * POWER_LINES.length)];
    }

    function createId() {
      return Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function getTodayString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }
 
    function addDays(dateString, amount) {
      const date = new Date(dateString + "T00:00:00");
      date.setDate(date.getDate() + amount);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function formatPrettyDate(dateString) {
      const date = new Date(dateString + "T00:00:00");
      return date.toLocaleDateString("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
    }

    function isValidDateString(dateString) {
      if (!dateString || dateString.length !== 10) return false;
      if (dateString.charAt(4) !== "-" || dateString.charAt(7) !== "-") return false;
      const date = new Date(dateString + "T00:00:00");
      return !Number.isNaN(date.getTime());
    }
  </script>
</body>
